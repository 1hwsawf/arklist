name: Update ASA Servers Data

on:
  schedule:
    - cron: '0 * * * *'  # 每小时执行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch, Clean and Compress Data
        shell: python
        run: |
          import urllib.request
          import json
          import os

          url = 'https://cdn2.arkdedicated.com/servers/asa/unofficialserverlist.json'
          print("正在从官方 API 下载 50MB 的原始数据...")
          
          # 伪装成浏览器请求，防止被官方防火墙拦截
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
              
              # 处理数据结构：确保我们拿到的是列表 (Array)
              if isinstance(data, dict):
                  for k, v in data.items():
                      if isinstance(v, list):
                          data = v
                          break
                          
              if not isinstance(data, list):
                  data = []

              print(f"成功获取！共找到 {len(data)} 个服务器，开始进行数据清洗...")
              
              # 【核心压缩逻辑】只保留前端网页需要的字段，丢弃其他无用的大字段
              output = []
              for s in data:
                  output.append({
                      "SessionName": s.get("SessionName", "Unknown"),
                      "MapName": s.get("MapName", ""),
                      "SessionIsPve": s.get("SessionIsPve", 0),
                      "NumPlayers": s.get("NumPlayers", 0),
                      "MaxPlayers": s.get("MaxPlayers", 0),
                      "ServerPing": s.get("ServerPing", 999),
                      "IP": s.get("IP", ""),
                      "Port": s.get("Port", 0),
                      "HasPassword": s.get("HasPassword", False),
                      "BuildId": s.get("BuildId", 0),
                      "MinorBuildId": s.get("MinorBuildId", 0)
                  })
                  
              # 使用 separators=(',', ':') 移除 JSON 中的空格和换行，达到极限压缩
              with open('servers.json', 'w', encoding='utf-8') as f:
                  json.dump(output, f, separators=(',', ':'))
                  
              new_size = os.path.getsize('servers.json') / (1024 * 1024)
              print(f"数据清洗完毕！压缩后的新文件大小为: {new_size:.2f} MB")
              
          except Exception as e:
              print(f"处理过程中发生错误: {e}")
              exit(1)

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add servers.json
          git commit -m "Auto-update and compress server data" || exit 0
          git push
