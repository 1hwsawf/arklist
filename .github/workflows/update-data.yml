name: Update ASA Servers Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每小时的第 0 分钟自动执行 (UTC 时间)
  workflow_dispatch:      # 允许你在 GitHub 界面上手动点击按钮触发更新

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 赋予写权限，允许 Actions 把压缩后的 JSON 推送回仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch, Clean and Compress Data
        shell: python
        run: |
          import urllib.request
          import json
          import os

          url = 'https://cdn2.arkdedicated.com/servers/asa/unofficialserverlist.json'
          print("正在下载官方原始数据...")
          
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode('utf-8'))
              
              # 自动解包（兼容列表外嵌套对象的情况）
              if isinstance(data, dict):
                  for k, v in data.items():
                      if isinstance(v, list):
                          data = v
                          break
                          
              if not isinstance(data, list):
                  data = []

              print(f"下载成功！共找到 {len(data)} 个服务器，开始进行针对性清洗...")
              
              # 【核心逻辑】严格对照你提供的 JSON 键名进行精准提取，抛弃几万条记录里的冗余字段
              output = []
              for s in data:
                  output.append({
                      "SessionName": s.get("SessionName", "Unknown"),
                      "MapName": s.get("MapName", ""),
                      "SessionIsPve": s.get("SessionIsPve", 0),
                      "NumPlayers": s.get("NumPlayers", 0),
                      "MaxPlayers": s.get("MaxPlayers", 0),
                      "ServerPing": s.get("ServerPing", 999),
                      "IP": s.get("IP", ""),
                      "Port": s.get("Port", 0),
                      "HasPassword": True if s.get("HasPassword") else False,
                      "BuildId": s.get("BuildId", 0),
                      "MinorBuildId": s.get("MinorBuildId", 0)
                  })
                  
              # separators=(',', ':') 用于去除 JSON 中所有的空格和换行，实现体积极限压缩
              with open('servers.json', 'w', encoding='utf-8') as f:
                  json.dump(output, f, separators=(',', ':'))
                  
              new_size = os.path.getsize('servers.json') / (1024 * 1024)
              print(f"清洗完毕！文件已从 50MB 瘦身至: {new_size:.2f} MB，网页可以流畅解析了！")
              
          except Exception as e:
              print(f"执行出错: {e}")
              exit(1)

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add servers.json
          git commit -m "自动同步并压缩全网ASA服务器数据" || exit 0
          git push
