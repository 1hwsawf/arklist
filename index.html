<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ARK 官方服务器列表 — 支持中文搜索、筛选与分页浏览">
  <title>ARK 服务器列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-mesh"></div>

  <div class="app">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1 class="hero-title">ARK 服务器列表</h1>
          <p class="hero-sub">浏览、搜索与筛选官方服务器 · 自动加载数据 · 每页 20 条</p>
        </div>
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">正在初始化…</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">服务器总数</div>
          <div class="stat-value accent" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">PVE 服务器</div>
          <div class="stat-value pve" id="statPve">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">PVP 服务器</div>
          <div class="stat-value pvp" id="statPvp">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">当前匹配</div>
          <div class="stat-value" id="statMatch">—</div>
        </div>
      </div>
    </header>

    <div id="mainPanel" class="hidden">
      <section class="panel">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" class="search-input" id="searchText"
            placeholder="搜索服务器名称、IP、地图（支持中文，如「孤岛」「仙境」）…" autocomplete="off">
        </div>

        <button class="filter-toggle" id="filterToggle" type="button">
          <span>高级筛选</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>

        <div class="filters-body" id="filtersBody">
          <div class="field">
            <label for="filterMap">地图</label>
            <select id="filterMap"><option value="">全部地图</option></select>
          </div>
          <div class="field">
            <label for="filterMode">游戏模式</label>
            <select id="filterMode">
              <option value="">全部模式</option>
              <option value="pve">PVE（PvE）</option>
              <option value="pvp">PVP（PvP）</option>
            </select>
          </div>
          <div class="field">
            <label for="filterPassword">密码保护</label>
            <select id="filterPassword">
              <option value="">不限</option>
              <option value="no">无密码</option>
              <option value="yes">有密码</option>
            </select>
          </div>
          <div class="field">
            <label for="filterCluster">集群</label>
            <select id="filterCluster"><option value="">全部集群</option></select>
          </div>
          <div class="field">
            <label for="filterPlatform">支持平台</label>
            <select id="filterPlatform"><option value="">全部平台</option></select>
          </div>
          <div class="field">
            <label for="filterBuild">游戏版本</label>
            <select id="filterBuild"><option value="">全部版本</option></select>
          </div>
          <div class="field">
            <label for="minPlayers">最少在线人数</label>
            <input type="number" id="minPlayers" min="0" placeholder="0">
          </div>
          <div class="field">
            <label for="maxPing">最大延迟 (ms)</label>
            <input type="number" id="maxPing" min="0" placeholder="不限">
          </div>
          <div class="field">
            <label for="minSlots">最少空余位</label>
            <input type="number" id="minSlots" min="0" placeholder="0">
          </div>
          <div class="field">
            <label for="sortSelect">排序方式</label>
            <select id="sortSelect">
              <option value="NumPlayers:-1">在线人数 ↓</option>
              <option value="NumPlayers:1">在线人数 ↑</option>
              <option value="ServerPing:1">延迟 ↑</option>
              <option value="ServerPing:-1">延迟 ↓</option>
              <option value="SessionName:1">名称 A→Z</option>
              <option value="MapName:1">地图 A→Z</option>
            </select>
          </div>
        </div>
      </section>

      <div class="toolbar">
        <span class="result-text" id="resultText">—</span>
        <div class="btn-group">
          <button class="btn btn-ghost" id="resetBtn" type="button">重置筛选</button>
          <button class="btn btn-ghost" id="exportBtn" type="button">导出 CSV</button>
          <button class="btn btn-primary" id="reloadBtn" type="button">刷新数据</button>
        </div>
      </div>

      <div class="server-list" id="serverList"></div>
      <nav class="pagination hidden" id="pagination" aria-label="分页导航"></nav>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">服务器详情</h2>
        <button class="btn btn-ghost" id="closeModal" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <dl class="detail-grid" id="detailGrid"></dl>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
