name: Update ASA Servers Data

on:
  schedule:
    - cron: '0 * * * *'  # 每小时的第 0 分钟自动执行 (UTC 时间)
  workflow_dispatch:      # 允许你在 GitHub 界面上手动点击按钮触发更新

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 必须赋予写权限，否则 Actions 无法把更新后的 JSON 推送回仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download JSON from Ark API
        run: |
          # 核心拉取指令，若拉取失败则抛出错误阻止流水线错误覆盖
          curl -f -s https://cdn2.arkdedicated.com/servers/asa/unofficialserverlist.json > servers.json

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add servers.json
          # 如果文件内容没有发生改变，git commit 会返回 1。这里用 || exit 0 确保在没有新更新时工作流不报错挂掉
          git commit -m "自动同步最新方舟ASA非官方服务器列表" || exit 0
          git push
